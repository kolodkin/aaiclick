name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must match vX.Y.Z)"
        required: true
        type: string
      pre-release:
        description: "Mark as pre-release on GitHub"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          if ! echo "${{ inputs.tag }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: tag '${{ inputs.tag }}' does not match vX.Y.Z"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Export pinned dependencies (local backend)
        run: uv export --frozen --extra test --extra ai --no-emit-project -o requirements-local.txt

      - name: Export pinned dependencies (distributed backend)
        run: uv export --frozen --extra test --extra distributed --extra ai --no-emit-project -o requirements-dist.txt

      - name: Upload requirements artifacts
        uses: actions/upload-artifact@v6
        with:
          name: requirements
          path: |
            requirements-local.txt
            requirements-dist.txt

  test-package-local:
    needs: build
    runs-on: ubuntu-latest

    env:
      AAICLICK_AI_MODEL: ollama/llama3.2:1b
      AAICLICK_AI_LIVE_TESTS: "1"

    services:
      ollama:
        image: ollama/ollama:latest
        env:
          OLLAMA_HOST: 0.0.0.0
        ports:
          - 11434:11434
        volumes:
          - /home/runner/.ollama:/root/.ollama
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/11434'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create virtual environment
        run: uv venv --python 3.10

      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Download requirements artifacts
        uses: actions/download-artifact@v7
        with:
          name: requirements

      - name: Install pinned dependencies and built wheel
        run: |
          uv pip install -r requirements-local.txt
          uv pip install --no-deps --find-links dist/ "aaiclick[ai]"

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-1b

      - name: Setup local backend and pull model
        run: uv run --no-project python -m aaiclick setup --ai

      - name: Run tests against installed package (local backend)
        working-directory: /tmp
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: >-
          uv run --no-project pytest --pyargs aaiclick -n auto -v
          -o asyncio_mode=auto
          -o "filterwarnings=error"
          --strict-markers
          -W error
          --junitxml=/tmp/pytest-report.xml

  test-package:
    needs: build
    runs-on: ubuntu-latest

    env:
      AAICLICK_AI_MODEL: ollama/llama3.2:1b
      AAICLICK_AI_LIVE_TESTS: "1"

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.11.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 0
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --add-host=host.docker.internal:host-gateway

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aaiclick"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      ollama:
        image: ollama/ollama:latest
        env:
          OLLAMA_HOST: 0.0.0.0
        ports:
          - 11434:11434
        volumes:
          - /home/runner/.ollama:/root/.ollama
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/11434'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create virtual environment
        run: uv venv --python 3.10

      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Download requirements artifacts
        uses: actions/download-artifact@v7
        with:
          name: requirements

      - name: Install pinned dependencies and built wheel
        run: |
          uv pip install -r requirements-dist.txt
          uv pip install --no-deps --find-links dist/ "aaiclick[distributed,ai]"

      - name: Run database migrations
        env:
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
        run: uv run --no-project python -m aaiclick migrate upgrade head

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-1b

      - name: Pull Ollama model
        run: uv run --no-project python -m aaiclick setup --ai

      - name: Run tests against installed package (distributed backend)
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
          AAICLICK_CH_URL: "clickhouse://default:click123@localhost:8123/default"
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: 8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DB: default
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
          AAICLICK_TEST_FILESERVER_HOST: host.docker.internal
        working-directory: /tmp
        run: >-
          uv run --no-project pytest --pyargs aaiclick -n auto -v
          -o asyncio_mode=auto
          -o "filterwarnings=error"
          --strict-markers
          -W error
          --junitxml=/tmp/pytest-report.xml

  publish:
    needs: [test-package-local, test-package]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ inputs.tag }}
          git push origin ${{ inputs.tag }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ inputs.tag }} dist/* \
            --title "${{ inputs.tag }}" \
            --generate-notes \
            ${{ inputs.pre-release && '--prerelease' || '' }}

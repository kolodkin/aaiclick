name: test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test-local:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: data-local
            title: Data Tests (Local/chdb)
            install: ".[test,local]"
            test-paths: "aaiclick/data/ aaiclick/test_snowflake.py"
            pytest-args: "-n auto -v"
          - group: orch-local
            title: Orchestration Tests (Local/SQLite)
            install: ".[orch,test,local]"
            test-paths: "aaiclick/orchestration/"
            pytest-args: "-n auto -v"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv venv --python 3.10
          uv pip install -e "${{ matrix.install }}"

      - name: Setup local backend
        run: |
          uv run python -m aaiclick setup

      - name: "Run tests: ${{ matrix.title }}"
        run: |
          mkdir -p tmp
          uv run pytest ${{ matrix.test-paths }} ${{ matrix.pytest-args }} --junitxml=tmp/pytest-report.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "pytest-results-${{ matrix.group }}"
          path: tmp/pytest-report.xml

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: "Pytest Results (${{ matrix.group }})"
          path: tmp/pytest-report.xml
          reporter: java-junit

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: data
            title: Data Tests (Distributed)
            install: ".[test]"
            test-paths: "aaiclick/data/ aaiclick/test_snowflake.py aaiclick/benchmarks/"
            pytest-args: "-n auto -v"
            needs-postgres: false
          - group: orch
            title: Orchestration Tests (Distributed)
            install: ".[orch,test]"
            test-paths: "aaiclick/orchestration/"
            pytest-args: "-n auto -v"
            needs-postgres: true

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.11.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 0
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --add-host=host.docker.internal:host-gateway

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aaiclick"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv venv --python 3.10
          uv pip install -e "${{ matrix.install }}"

      - name: Run database migrations
        if: matrix.needs-postgres
        env:
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
        run: |
          echo "Running database migrations..."
          uv run python -m aaiclick migrate upgrade head

      - name: "Run tests: ${{ matrix.title }}"
        env:
          AAICLICK_CH_URL: "clickhouse://default:click123@localhost:8123/default"
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: 8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DB: default
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
          AAICLICK_TEST_FILESERVER_HOST: host.docker.internal
        run: |
          mkdir -p tmp
          uv run pytest ${{ matrix.test-paths }} ${{ matrix.pytest-args }} --junitxml=tmp/pytest-report.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "pytest-results-${{ matrix.group }}"
          path: tmp/pytest-report.xml

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: "Pytest Results (${{ matrix.group }})"
          path: tmp/pytest-report.xml
          reporter: java-junit

  examples:
    runs-on: ubuntu-latest

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.11.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 0
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aaiclick"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv venv --python 3.10
          uv pip install -e ".[dev]"

      - name: Run database migrations
        env:
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
        run: |
          uv run python -m aaiclick migrate upgrade head

      - name: Run examples
        env:
          AAICLICK_CH_URL: "clickhouse://default:click123@localhost:8123/default"
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: 8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DB: default
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
          AAICLICK_LOG_DIR: /tmp/aaiclick/logs
        run: |
          mkdir -p tmp
          uv run python -m aaiclick.examples.run_all 2>&1 | tee tmp/examples_output.txt
          exit ${PIPESTATUS[0]}

      - name: Add example outputs to summary
        if: always()
        run: |
          uv run python .github/scripts/generate_summary.py

  example-projects:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: basic-worker
            title: Basic Worker Example
            command: "aaiclick/example_projects/basic_worker/basic_worker.sh"
          - project: nyc-taxi-pipeline
            title: NYC Taxi Pipeline
            command: "aaiclick/example_projects/nyc_taxi_pipeline/nyc_taxi_pipeline.sh"
          - project: cyber-threat-feeds
            title: Cyber Threat Feeds Pipeline
            command: "aaiclick/example_projects/cyber_threat_feeds/cyber_threat_feeds.sh"

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.11.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 0
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aaiclick"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv venv --python 3.10
          uv pip install -e ".[dev]"

      - name: Run database migrations
        env:
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
        run: |
          uv run python -m aaiclick migrate upgrade head

      - name: "Run: ${{ matrix.title }}"
        env:
          AAICLICK_CH_URL: "clickhouse://default:click123@localhost:8123/default"
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: 8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DB: default
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
          AAICLICK_LOG_DIR: /tmp/aaiclick/logs
        run: |
          mkdir -p tmp
          ${{ matrix.command }} 2>&1 | tee tmp/${{ matrix.project }}_output.txt
          exit ${PIPESTATUS[0]}

      - name: Add output to summary
        if: always()
        run: |
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>${{ matrix.title }}</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat tmp/${{ matrix.project }}_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No output captured" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

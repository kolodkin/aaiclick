name: test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

env:
  # dorny/test-reporter@v2 uses Node.js 20 (deprecated on GH Actions from June 2026).
  # No v3 exists yet — opt into Node.js 24 early to silence the deprecation warning.
  # Remove once dorny/test-reporter releases a Node.js 24-compatible version.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install docs dependencies
        run: uv sync --frozen --extra docs --python 3.10

      - name: Build docs (strict)
        run: uv run mkdocs build --strict

  test-local:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: data-local
            title: Data Tests (Local/chdb)
            test-paths: "aaiclick/data/ aaiclick/test_snowflake.py"
          - group: orch-local
            title: Orchestration Tests (Local/SQLite)
            test-paths: "aaiclick/orchestration/"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync --frozen --extra test --python 3.10

      - name: Setup local backend
        run: |
          uv run python -m aaiclick setup

      - name: "Run tests: ${{ matrix.title }}"
        run: |
          mkdir -p tmp
          uv run pytest ${{ matrix.test-paths }} -n auto -v --junitxml=tmp/pytest-report.xml

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: "Pytest Results (${{ matrix.group }})"
          path: tmp/pytest-report.xml
          reporter: java-junit

  test-dist:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: data-dist
            title: Data Tests (Distributed/ClickHouse)
            test-paths: "aaiclick/data/ aaiclick/test_snowflake.py"
          - group: orch-dist
            title: Orchestration Tests (Distributed/PostgreSQL)
            test-paths: "aaiclick/orchestration/"

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.11.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 0
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --add-host=host.docker.internal:host-gateway

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aaiclick"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync --frozen --extra distributed --extra test --python 3.10

      - name: Run database migrations
        env:
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
        run: |
          echo "Running database migrations..."
          uv run python -m aaiclick migrate upgrade head

      - name: "Run tests: ${{ matrix.title }}"
        env:
          AAICLICK_CH_URL: "clickhouse://default:click123@localhost:8123/default"
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: 8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DB: default
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
          AAICLICK_TEST_FILESERVER_HOST: host.docker.internal
        run: |
          mkdir -p tmp
          uv run pytest ${{ matrix.test-paths }} -n auto -v --junitxml=tmp/pytest-report.xml

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: "Pytest Results (${{ matrix.group }})"
          path: tmp/pytest-report.xml
          reporter: java-junit

  examples:
    runs-on: ubuntu-latest

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.11.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 0
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aaiclick"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync --frozen --extra dev --python 3.10

      - name: Run database migrations
        env:
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
        run: |
          uv run python -m aaiclick migrate upgrade head

      - name: Run examples
        env:
          AAICLICK_CH_URL: "clickhouse://default:click123@localhost:8123/default"
          AAICLICK_SQL_URL: "postgresql+asyncpg://aaiclick:secret@localhost:5432/aaiclick"
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: 8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: click123
          CLICKHOUSE_DB: default
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aaiclick
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: aaiclick
          AAICLICK_LOG_DIR: /tmp/aaiclick/logs
        run: |
          mkdir -p tmp
          uv run python -m aaiclick.examples.run_all 2>&1 | tee tmp/examples_output.txt
          exit ${PIPESTATUS[0]}

      - name: Add example outputs to summary
        if: always()
        run: |
          uv run python .github/scripts/generate_summary.py


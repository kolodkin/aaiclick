name: project-ai-tests

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  actions: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AAICLICK_AI_MODEL: ollama/llama3.2:1b
  AAICLICK_AI_LIVE_TESTS: "1"

jobs:
  ai-provider:
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama:latest
        env:
          OLLAMA_HOST: 0.0.0.0
        ports:
          - 11434:11434
        volumes:
          - /home/runner/.ollama:/root/.ollama
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/11434'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync --frozen --extra ai --extra test --python 3.10

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-1b

      - name: Setup local backend and pull model
        run: uv run python -m aaiclick setup --ai

      - name: Run AI Provider Tests
        run: |
          mkdir -p tmp
          uv run pytest aaiclick/ai/test_provider_live.py -m live_llm -v --junitxml=tmp/pytest-report.xml

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: "Pytest Results (ai-provider)"
          path: tmp/pytest-report.xml
          reporter: java-junit

  ai-lineage:
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama:latest
        env:
          OLLAMA_HOST: 0.0.0.0
        ports:
          - 11434:11434
        volumes:
          - /home/runner/.ollama:/root/.ollama
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/11434'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync --frozen --extra ai --extra test --python 3.10

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-1b

      - name: Setup local backend and pull model
        run: uv run python -m aaiclick setup --ai

      - name: Run AI Lineage Agent Tests
        run: |
          mkdir -p tmp
          uv run pytest aaiclick/ai/agents/test_lineage_agent_live.py -m live_llm -v --junitxml=tmp/pytest-report.xml

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: "Pytest Results (ai-lineage)"
          path: tmp/pytest-report.xml
          reporter: java-junit
